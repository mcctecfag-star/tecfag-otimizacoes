<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecfag — Diário de Otimizações</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1F1F1F;--bg2:#252525;--bg3:#2C2C2C;--bg4:#333;
  --text:#E0DED4;--text2:#9E9C95;--text3:#5C5A55;
  --accent:#C83D4E;--accent-dim:rgba(200,61,78,.15);--accent-glow:rgba(200,61,78,.08);
  --border:rgba(224,222,212,.07);--border2:rgba(224,222,212,.13);
  --green:#5A9E6F;--green-dim:rgba(90,158,111,.12);
  --blue:#4A7FA5;--blue-dim:rgba(74,127,165,.12);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Arial',sans-serif;min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

.eerie{font-family:'Arial',sans-serif}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2.5rem;height:112px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-img{height:96px;display:block}
.header-right{display:flex;align-items:center;gap:12px}
.live-date{font-family:'Arial',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.05em}
.btn-add{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:5px;padding:8px 16px;font-family:'Arial',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.04em;text-transform:uppercase}
.btn-add:hover{opacity:.88}
.btn-add:active{transform:scale(.97)}

main{max-width:1100px;margin:0 auto;padding:2.5rem}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.5rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.25rem;position:relative;overflow:hidden;transition:border-color .2s}
.stat:hover{border-color:var(--border2)}
.stat-accent{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);opacity:.7}
.stat-label{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.stat-val{font-size:30px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.02em;font-family:'Arial',sans-serif}
.stat-sub{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);margin-top:6px}

/* FILTER GROUPS */
.filters-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-row-label{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;min-width:70px}
.chip{padding:5px 13px;border-radius:3px;font-family:'Arial',sans-serif;font-size:11px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;transition:all .15s;letter-spacing:.02em}
.chip:hover{border-color:var(--border2);color:var(--text2)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* DATE FILTER */
.date-inputs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-inputs input[type=date]{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:5px 10px;color:var(--text2);font-family:'Arial',sans-serif;font-size:11px;outline:none;transition:border-color .15s;cursor:pointer}
.date-inputs input[type=date]:focus{border-color:var(--accent)}
.date-inputs span{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3)}
.btn-clear-date{padding:5px 10px;border-radius:3px;font-family:'Arial',sans-serif;font-size:10px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;transition:all .15s}
.btn-clear-date:hover{border-color:var(--border2);color:var(--text2)}

/* SEARCH + TOOLBAR */
.toolbar-bottom{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:10px}
.entries-title{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.right-tools{display:flex;align-items:center;gap:8px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px 10px}
.search-box svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;font-family:'Arial',sans-serif;font-size:12px;color:var(--text2);width:160px}
.search-box input::placeholder{color:var(--text3)}
.entries-count{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);background:var(--bg3);padding:3px 9px;border-radius:3px;border:1px solid var(--border)}

.entries{display:flex;flex-direction:column;gap:8px}
.entry{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.4rem;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;transition:border-color .2s,background .15s}
.entry:hover{border-color:var(--border2);background:var(--bg3)}
.entry-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.entry-date{font-family:'Arial',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.03em}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-family:'Arial',sans-serif;font-size:10px;font-weight:500;letter-spacing:.04em}
.b-Meta{background:var(--accent-dim);color:#d97080;border:1px solid rgba(200,61,78,.2)}
.b-Google{background:var(--blue-dim);color:#6fa4cc;border:1px solid rgba(74,127,165,.2)}
.b-TikTok{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border)}
.b-LinkedIn{background:rgba(10,102,194,.12);color:#6aabdf;border:1px solid rgba(10,102,194,.2)}
.b-Outros{background:rgba(224,222,212,.05);color:var(--text3);border:1px solid var(--border)}
.seg-badge{display:inline-block;padding:2px 9px;border-radius:3px;font-family:'Arial',sans-serif;font-size:10px;font-weight:500;letter-spacing:.03em;background:rgba(184,136,42,.12);color:#c9a050;border:1px solid rgba(184,136,42,.2)}
.entry-client{font-family:'Arial',sans-serif;font-size:10px;color:var(--text3);margin-left:auto}
.entry-action{font-size:14px;color:var(--text);line-height:1.65}
.entry-result{margin-top:10px;font-size:12px;color:var(--green);background:var(--green-dim);border-left:2px solid rgba(90,158,111,.4);padding:7px 10px;border-radius:0 4px 4px 0;font-family:'Arial',sans-serif;line-height:1.55}

.entry-btns{display:flex;flex-direction:column;gap:6px}
.icon-btn{width:28px;height:28px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--border2);color:var(--text2)}
.icon-btn.del:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.icon-btn svg{width:13px;height:13px}

.empty{text-align:center;padding:6rem 2rem;border:1px dashed var(--border);border-radius:8px;background:var(--bg2)}
.empty-sym{font-size:32px;margin-bottom:1rem;opacity:.2;font-family:'Arial',sans-serif}
.empty p{font-size:14px;color:var(--text3);margin-bottom:.4rem}
.empty small{font-size:11px;font-family:'Arial',sans-serif;color:var(--text3)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px);padding:1rem}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:2rem;transform:translateY(20px);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem}
.modal-title{font-size:15px;font-weight:700;letter-spacing:.01em;font-family:'Arial',sans-serif}
.close-btn{width:32px;height:32px;background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.close-btn:hover{border-color:var(--accent);color:var(--accent)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-family:'Arial',sans-serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:9px 11px;color:var(--text);font-family:'Arial',sans-serif;font-size:14px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:85px;line-height:1.6}
.field select option{background:var(--bg2)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text3);padding:8px 18px;border-radius:5px;font-family:'Arial',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{color:var(--text)}
.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 22px;border-radius:5px;font-family:'Arial',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.88}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

.loading{text-align:center;padding:3rem;font-family:'Arial',sans-serif;font-size:12px;color:var(--text3)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:11px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

#pass-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem}
#pass-screen img{height:114px;margin-bottom:.5rem}
#pass-screen p{font-family:'Arial',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.pass-form{display:flex;gap:8px}
.pass-form input{background:var(--bg2);border:1px solid var(--border2);border-radius:5px;padding:10px 14px;color:var(--text);font-family:'Arial',sans-serif;font-size:14px;outline:none;width:220px;transition:border-color .15s;letter-spacing:.08em}
.pass-form input:focus{border-color:var(--accent)}
.pass-form button{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:10px 18px;font-family:'Arial',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.pass-form button:hover{opacity:.88}
.pass-err{font-family:'Arial',sans-serif;font-size:11px;color:var(--accent);display:none}

@media(max-width:680px){
  .stats{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .field.full{grid-column:1}
  header,main{padding-left:1.25rem;padding-right:1.25rem}
  .entry-client{display:none}
}
</style>
</head>

<script>
const API_KEY  = '$2a$10$/P9Zm0jaaf3C9rpaLCTRpuqSDKeX5OzXpIWNM9PyvAXV.AMLap76S';
const BIN_ID   = '6a26f0d7f5f4af5e29cc7a68';
const PASS     = 'tecfag2025';
const BASE_URL = 'https://api.jsonbin.io/v3';

let entries = [];
let editId  = null;
let filters = { plat: 'all', seg: 'all' };

// ── AUTH ──
document.getElementById('pass-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPass(); });

// Auto-login se sessão ainda estiver ativa
if(sessionStorage.getItem('tecfag_auth')==='1'){
  showApp();
}
function checkPass(){
  if(document.getElementById('pass-input').value === PASS){
    sessionStorage.setItem('tecfag_auth','1');
    showApp();
  } else {
    document.getElementById('pass-err').style.display='block';
    document.getElementById('pass-input').value='';
  }
}

function showApp(){
  document.getElementById('pass-screen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}

function initApp(){
  const d=new Date();
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('live-date').textContent=days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
  loadData();
}

// ── JSONBIN ──
async function loadData(){
  document.getElementById('entries-list').innerHTML='<div class="loading"><span class="spinner"></span>Carregando registros...</div>';
  await fetchBin();
}

async function fetchBin(){
  try {
    const res=await fetch(`${BASE_URL}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    if(res.ok){ const data=await res.json(); entries=data.record.entries||[]; }
    else entries=[];
  } catch(e){ entries=[]; }
  renderAll();
}



async function persistData(){
  try {
    await fetch(`${BASE_URL}/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({entries})});
  } catch(e){ showToast('Erro ao salvar. Verifique a conexão.'); }
}

// ── UTILS ──
function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d) return '—'; const[y,m,day]=d.split('-'); return day+'/'+m+'/'+y; }
function clearDates(){ document.getElementById('date-from').value=''; document.getElementById('date-to').value=''; renderList(); }

// ── FORM ──
function openForm(id){
  editId=id||null;
  if(editId){
    const e=entries.find(x=>x.id===id); if(!e) return;
    document.getElementById('modal-title').textContent='Editar registro';
    document.getElementById('f-date').value=e.date;
    document.getElementById('f-plat').value=e.platform;
    document.getElementById('f-seg').value=e.segment||'Tecfag Semi Industrial';
    document.getElementById('f-campaign').value=e.campaign||'';
    document.getElementById('f-action').value=e.action;
    document.getElementById('f-result').value=e.result;
  } else {
    document.getElementById('modal-title').textContent='Registrar otimização';
    document.getElementById('f-date').value=today();
    document.getElementById('f-plat').value='Meta';
    document.getElementById('f-seg').value='Tecfag Semi Industrial';
    ['f-campaign','f-action','f-result'].forEach(i=>document.getElementById(i).value='');
  }
  document.getElementById('overlay').classList.add('open');
}
function closeForm(){ document.getElementById('overlay').classList.remove('open'); editId=null; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeForm(); });

async function saveEntry(){
  const action=document.getElementById('f-action').value.trim();
  if(!action){ showToast('Descreva a otimização realizada.'); return; }
  const btn=document.getElementById('btn-save');
  btn.textContent='Salvando...'; btn.disabled=true;
  const entry={
    id: editId||Date.now(),
    date: document.getElementById('f-date').value||today(),
    platform: document.getElementById('f-plat').value,
    segment: document.getElementById('f-seg').value,
    campaign: document.getElementById('f-campaign').value.trim(),
    action,
    result: document.getElementById('f-result').value.trim()
  };
  if(editId) entries=entries.map(e=>e.id===editId?entry:e);
  else entries.unshift(entry);
  await persistData();
  btn.textContent='Salvar registro'; btn.disabled=false;
  closeForm(); renderAll();
  showToast(editId?'Registro atualizado!':'Registro salvo com sucesso!');
}

async function deleteEntry(id){
  if(!confirm('Excluir este registro permanentemente?')) return;
  entries=entries.filter(e=>e.id!==id);
  await persistData(); renderAll();
  showToast('Registro removido.');
}

// ── FILTERS ──
function setFilter(type, val, btn){
  filters[type]=val;
  const group = btn.closest('.filter-row');
  group.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER ──
function renderAll(){
  const d=new Date();
  const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  const mN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('s-total').textContent=entries.length;
  document.getElementById('s-month').textContent=entries.filter(e=>e.date&&e.date.startsWith(ym)).length;
  document.getElementById('s-month-lbl').textContent=mN[d.getMonth()];
  renderList();
}

function renderList(){
  const search=(document.getElementById('search-inp')?.value||'').toLowerCase();
  const dateFrom=document.getElementById('date-from')?.value||'';
  const dateTo=document.getElementById('date-to')?.value||'';

  let f=[...entries];
  if(filters.plat!=='all') f=f.filter(e=>e.platform===filters.plat);
  if(filters.seg!=='all') f=f.filter(e=>e.segment===filters.seg);
  if(dateFrom) f=f.filter(e=>e.date>=dateFrom);
  if(dateTo) f=f.filter(e=>e.date<=dateTo);
  if(search) f=f.filter(e=>e.action.toLowerCase().includes(search)||(e.client||'').toLowerCase().includes(search)||(e.segment||'').toLowerCase().includes(search));

  document.getElementById('entries-count').textContent=f.length+' registro'+(f.length!==1?'s':'');
  const el=document.getElementById('entries-list');
  if(!f.length){
    el.innerHTML='<div class="empty"><div class="empty-sym">[ ]</div><p>Nenhum registro encontrado</p><small>Clique em "+ Nova entrada" para começar</small></div>';
    return;
  }

  const platLabel={'Meta':'Meta Ads','Google':'Google Ads','TikTok':'TikTok Ads','LinkedIn':'LinkedIn Ads','Outros':'Outros'};
  el.innerHTML=f.map(e=>`
    <div class="entry">
      <div>
        <div class="entry-meta">
          <span class="entry-date">${fmt(e.date)}</span>
          <span class="badge b-${e.platform}">${platLabel[e.platform]||e.platform}</span>
          ${e.segment?`<span class="seg-badge">${e.segment}</span>`:''}
          ${e.campaign?`<span class="entry-type" style="color:var(--text2)">${e.campaign}</span>`:''}
        </div>
        <div class="entry-action">${e.action}</div>
        ${e.result?`<div class="entry-result">↳ ${e.result}</div>`:''}
      </div>
      <div class="entry-btns">
        <button class="icon-btn" onclick="openForm(${e.id})" title="Editar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del" onclick="deleteEntry(${e.id})" title="Excluir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
</body>
</html>
